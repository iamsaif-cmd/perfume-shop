<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Essence — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=3">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-sticky">
  <div class="navbar-essence">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="signup.html">Create Account</a>
    </div>
  </div>
</nav>

<div class="auth-box reveal">
  <h2 style="text-align:center; margin-bottom:20px;">Welcome Back</h2>
  <p id="formError" class="error-text" style="display:none;"></p>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" class="btn-gold">Log In</button>
  </form>
  <p style="text-align:center; margin-top:18px; font-size:.85rem; color:var(--grey);">
    New here? <a href="signup.html" style="color:var(--gold); text-decoration:underline;">Create an account</a>
  </p>
</div>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('formError');
    errEl.style.display = 'none';

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      return;
    }

    await mergeGuestCartIntoAccount();
    const redirectTo = sessionStorage.getItem('redirectAfterLogin');
    sessionStorage.removeItem('redirectAfterLogin');
    window.location.href = redirectTo || 'index.html';
  });
</script>
</body>
</html>
