<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Essence — Fine Fragrance</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-essence">
  <div class="container">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <input type="checkbox" id="navToggle">
    <label for="navToggle" class="burger"><span></span><span></span><span></span></label>
    <label for="navToggle" class="nav-overlay"></label>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span id="cartBadge" class="cart-badge" style="display:none;"></span></a>
      <a id="navAdminLink" href="admin.html" style="display:none;">Admin</a>
      <a id="navAuthLink" href="login.html">Login</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-blob"></div>
  <div class="container">
    <p class="eyebrow reveal show">Small-Batch Perfumery</p>
    <h1 class="reveal show">Scent is<br>the quietest<br>kind of memory.</h1>
    <div class="rule reveal show"></div>
    <p class="reveal show">Sixteen fragrances, each built note by note — top, heart, and base — for people who want to be remembered without saying a word.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search fragrances…">
    </div>
    <div class="filter-bar" id="filterBar">
      <button data-cat="all" class="active">All</button>
      <button data-cat="women">Women</button>
      <button data-cat="men">Men</button>
      <button data-cat="unisex">Unisex</button>
    </div>
    <div class="product-grid" id="productGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 Essence Perfumery — Handcrafted fragrance, made in small batches.</p>
  </div>
</footer>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  let currentCategory = 'all';
  let currentSearch = '';
  let searchDebounce;

  function skeletonHTML(n = 4) {
    return Array.from({ length: n }).map(() => `<div class="skeleton-card"></div>`).join('');
  }

  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = skeletonHTML();
    try {
      const params = new URLSearchParams();
      if (currentCategory !== 'all') params.set('category', currentCategory);
      if (currentSearch) params.set('search', currentSearch);
      const query = params.toString() ? `?${params.toString()}` : '';
      const products = await apiFetch(`/products${query}`);

      if (!products.length) {
        grid.innerHTML = `<p style="color:var(--grey);">No fragrances match that search.</p>`;
        return;
      }
      grid.innerHTML = products.map((p, i) => `
        <div class="product-card reveal" style="transition-delay:${(i % 8) * 70}ms;">
          <a href="product.html?id=${p.id}">
            <img src="${p.image_url}" alt="${p.name}">
          </a>
          <div class="product-body">
            <p class="cat">${p.category}</p>
            <h3><a href="product.html?id=${p.id}">${p.name}</a></h3>
            <p class="price">${formatPrice(p.price)}</p>
            <button class="btn-outline add-btn" onclick="quickAdd('${p.id}')" ${p.stock === 0 ? 'disabled' : ''}>
              ${p.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `).join('');
      requestAnimationFrame(() => {
        document.querySelectorAll('.product-card.reveal').forEach(el => el.classList.add('show'));
      });
    } catch (err) {
      grid.innerHTML = `<p class="error-text">Couldn't load fragrances: ${err.message}. The backend may be waking up — try again in a few seconds.</p>`;
    }
  }

  async function quickAdd(productId) {
    const { data: { session } } = await supabaseClient.auth.getSession();

    // Guests can add to cart too — we merge it into their account at login.
    if (!session) {
      guestAddToCart(productId, 1);
      refreshCartBadge();
      showToast('Added to cart — log in at checkout to complete your order.', 'success');
      return;
    }
    try {
      await apiFetch('/cart', { method: 'POST', body: JSON.stringify({ product_id: productId, quantity: 1 }) });
      refreshCartBadge();
      showToast('Added to cart', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  document.getElementById('filterBar').addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    document.querySelectorAll('#filterBar button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.cat;
    loadProducts();
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      currentSearch = e.target.value.trim();
      loadProducts();
    }, 350);
  });

  loadProducts();
</script>
</body>
</html>
