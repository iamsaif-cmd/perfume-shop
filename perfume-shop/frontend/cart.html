<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence — Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-essence">
  <div class="container">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <input type="checkbox" id="navToggle">
    <label for="navToggle" class="burger"><span></span><span></span><span></span></label>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span id="cartBadge" class="cart-badge" style="display:none;"></span></a>
      <a id="navAdminLink" href="admin.html" style="display:none;">Admin</a>
      <a id="navAuthLink" href="login.html">Login</a>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1 style="font-size:2rem;">Your Cart</h1>
    <div class="rule"></div>
    <div style="display:grid; grid-template-columns:2fr 1fr; gap:40px; margin-top:30px;" id="cartLayout">
      <div id="cartItems"><p style="color:var(--grey);">Loading…</p></div>
      <div class="cart-summary">
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span>Free</span></div>
        <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
        <button class="btn-gold" style="width:100%; margin-top:20px;" id="checkoutBtn" onclick="checkout()">Checkout</button>
        <p id="checkoutMsg" style="margin-top:12px; font-size:.85rem;"></p>
      </div>
    </div>
  </div>
</section>

<footer><div class="container"><p>© 2026 Essence Perfumery</p></div></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  let cartData = [];

  async function loadCart() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const wrap = document.getElementById('cartItems');
    try {
      cartData = await apiFetch('/cart');
      if (!cartData.length) {
        wrap.innerHTML = `<p style="color:var(--grey);">Your cart is empty. <a href="index.html" style="color:var(--gold); text-decoration:underline;">Browse fragrances</a>.</p>`;
        updateTotals();
        return;
      }
      wrap.innerHTML = cartData.map(item => `
        <div class="cart-item">
          <img src="${item.product.image_url}" alt="${item.product.name}">
          <div style="flex:1;">
            <h3 style="margin:0 0 4px; font-size:1.05rem;">${item.product.name}</h3>
            <p style="color:var(--grey); font-size:.85rem; margin:0;">${formatPrice(item.product.price)} × ${item.quantity}</p>
          </div>
          <div class="qty-row" style="margin:0;">
            <button onclick="updateQty('${item.id}', ${item.quantity - 1})">−</button>
            <span>${item.quantity}</span>
            <button onclick="updateQty('${item.id}', ${item.quantity + 1})">+</button>
          </div>
          <button class="icon-btn" onclick="removeItem('${item.id}')">Remove</button>
        </div>
      `).join('');
      updateTotals();
    } catch (err) {
      wrap.innerHTML = `<p class="error-text">${err.message}</p>`;
    }
  }

  function updateTotals() {
    const subtotal = cartData.reduce((sum, i) => sum + i.product.price * i.quantity, 0);
    document.getElementById('subtotal').textContent = formatPrice(subtotal);
    document.getElementById('total').textContent = formatPrice(subtotal);
    document.getElementById('checkoutBtn').disabled = cartData.length === 0;
  }

  async function updateQty(id, newQty) {
    if (newQty < 1) return removeItem(id);
    try {
      await apiFetch(`/cart/${id}`, { method: 'PUT', body: JSON.stringify({ quantity: newQty }) });
      loadCart(); refreshCartBadge();
    } catch (err) { alert(err.message); }
  }

  async function removeItem(id) {
    try {
      await apiFetch(`/cart/${id}`, { method: 'DELETE' });
      loadCart(); refreshCartBadge();
    } catch (err) { alert(err.message); }
  }

  async function checkout() {
    const msg = document.getElementById('checkoutMsg');
    try {
      const result = await apiFetch('/orders/checkout', { method: 'POST' });
      msg.className = 'success-text';
      msg.textContent = `Order placed! Order #${result.order.id.slice(0,8)}`;
      cartData = [];
      loadCart(); refreshCartBadge();
    } catch (err) {
      msg.className = 'error-text';
      msg.textContent = err.message;
    }
  }

  loadCart();
</script>
</body>
</html>
