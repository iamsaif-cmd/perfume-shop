<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-essence">
  <div class="container">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span id="cartBadge" class="cart-badge" style="display:none;"></span></a>
      <a id="navAdminLink" href="admin.html" style="display:none;">Admin</a>
      <a id="navAuthLink" href="login.html">Login</a>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1 style="font-size:2rem;">Admin — Manage Products</h1>
    <div class="rule"></div>

    <div id="accessCheck"></div>

    <div id="adminContent" style="display:none;">
      <div class="admin-form">
        <h3 id="formTitle" style="margin-top:0;">Add New Fragrance</h3>
        <input type="hidden" id="editId">
        <div class="form-grid">
          <input type="text" id="f_name" placeholder="Name *">
          <input type="text" id="f_brand" placeholder="Brand" value="Essence House">
        </div>
        <textarea id="f_description" placeholder="Description" rows="2"></textarea>
        <div class="form-grid">
          <input type="text" id="f_top" placeholder="Top notes">
          <input type="text" id="f_heart" placeholder="Heart notes">
        </div>
        <div class="form-grid">
          <input type="text" id="f_base" placeholder="Base notes">
          <select id="f_category">
            <option value="unisex">Unisex</option>
            <option value="women">Women</option>
            <option value="men">Men</option>
          </select>
        </div>
        <div class="form-grid">
          <input type="number" id="f_price" placeholder="Price (₹) *">
          <input type="number" id="f_stock" placeholder="Stock" value="20">
        </div>
        <input type="text" id="f_image" placeholder="Image URL">
        <button class="btn-gold" onclick="saveProduct()">Save Fragrance</button>
        <button class="icon-btn" onclick="resetForm()" style="margin-left:12px;">Cancel Edit</button>
        <p id="adminMsg" style="margin-top:10px; font-size:.85rem;"></p>
      </div>

      <table class="admin-table">
        <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </div>
</section>

<footer><div class="container"><p>© 2026 Essence Perfumery</p></div></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  let allProducts = [];

  async function checkAdminAccess() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const accessCheck = document.getElementById('accessCheck');

    if (!session) {
      accessCheck.innerHTML = `<p class="error-text">Please <a href="login.html" style="color:var(--gold); text-decoration:underline;">log in</a> to access admin tools.</p>`;
      return false;
    }

    const { data: profile } = await supabaseClient.from('profiles').select('is_admin').eq('id', session.user.id).single();
    if (!profile?.is_admin) {
      accessCheck.innerHTML = `<p class="error-text">Your account doesn't have admin access. Ask a project owner to set is_admin = true on your profile row in Supabase.</p>`;
      return false;
    }

    document.getElementById('adminContent').style.display = 'block';
    return true;
  }

  async function loadProducts() {
    allProducts = await apiFetch('/products');
    const tbody = document.getElementById('productTableBody');
    tbody.innerHTML = allProducts.map(p => `
      <tr>
        <td><img src="${p.image_url}" alt="${p.name}"></td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>${formatPrice(p.price)}</td>
        <td>${p.stock}</td>
        <td>
          <button class="icon-btn" onclick="editProduct('${p.id}')">Edit</button>
          <button class="icon-btn" onclick="deleteProduct('${p.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function editProduct(id) {
    const p = allProducts.find(x => x.id === id);
    document.getElementById('formTitle').textContent = 'Edit Fragrance';
    document.getElementById('editId').value = p.id;
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_brand').value = p.brand || '';
    document.getElementById('f_description').value = p.description || '';
    document.getElementById('f_top').value = p.top_notes || '';
    document.getElementById('f_heart').value = p.heart_notes || '';
    document.getElementById('f_base').value = p.base_notes || '';
    document.getElementById('f_category').value = p.category;
    document.getElementById('f_price').value = p.price;
    document.getElementById('f_stock').value = p.stock;
    document.getElementById('f_image').value = p.image_url || '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('formTitle').textContent = 'Add New Fragrance';
    document.getElementById('editId').value = '';
    ['f_name','f_brand','f_description','f_top','f_heart','f_base','f_price','f_stock','f_image'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_brand').value = 'Essence House';
    document.getElementById('f_stock').value = 20;
  }

  async function saveProduct() {
    const msg = document.getElementById('adminMsg');
    const id = document.getElementById('editId').value;
    const payload = {
      name: document.getElementById('f_name').value,
      brand: document.getElementById('f_brand').value,
      description: document.getElementById('f_description').value,
      top_notes: document.getElementById('f_top').value,
      heart_notes: document.getElementById('f_heart').value,
      base_notes: document.getElementById('f_base').value,
      category: document.getElementById('f_category').value,
      price: parseFloat(document.getElementById('f_price').value),
      stock: parseInt(document.getElementById('f_stock').value || 0),
      image_url: document.getElementById('f_image').value,
    };

    if (!payload.name || !payload.price) {
      msg.className = 'error-text'; msg.textContent = 'Name and price are required.';
      return;
    }

    try {
      if (id) {
        await apiFetch(`/products/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        msg.className = 'success-text'; msg.textContent = 'Fragrance updated.';
      } else {
        await apiFetch('/products', { method: 'POST', body: JSON.stringify(payload) });
        msg.className = 'success-text'; msg.textContent = 'Fragrance added.';
      }
      resetForm();
      loadProducts();
    } catch (err) {
      msg.className = 'error-text'; msg.textContent = err.message;
    }
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this fragrance?')) return;
    try {
      await apiFetch(`/products/${id}`, { method: 'DELETE' });
      loadProducts();
    } catch (err) {
      alert(err.message);
    }
  }

  (async () => {
    const ok = await checkAdminAccess();
    if (ok) loadProducts();
  })();
</script>
</body>
</html>
