<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Essence — Product</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-sticky">
  <div class="navbar-essence">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <input type="checkbox" id="navToggle">
    <label for="navToggle" class="burger"><span></span><span></span><span></span></label>
    <label for="navToggle" class="nav-overlay"></label>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span id="cartBadge" class="cart-badge" style="display:none;"></span></a>
      <a href="wishlist.html">Wishlist</a>
      <a id="navOrdersLink" href="orders.html" style="display:none;">Orders</a>
      <a id="navAdminLink" href="admin.html" style="display:none;">Admin</a>
      <a id="navAuthLink" href="login.html">Login</a>
    </div>
  </div>
</nav>

<section>
  <div class="container" id="productDetail">
    <p style="color:var(--grey);">Loading…</p>
  </div>
</section>

<section id="relatedSection" style="display:none; padding-top:0;">
  <div class="container">
    <p class="eyebrow" style="margin-bottom:12px;">You May Also Like</p>
    <div class="rail" id="relatedRail"></div>
  </div>
</section>

<div class="sticky-add-bar" id="stickyBar" style="display:none;">
  <span class="price" id="stickyPrice"></span>
  <button class="btn-gold" id="stickyAddBtn" onclick="addToCart(productId)">Add to Cart</button>
</div>

<footer><div class="container"><p>© 2026 Essence Perfumery</p></div></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let currentQty = 1;
  let currentStock = 0;

  async function loadProduct() {
    const wrap = document.getElementById('productDetail');
    if (!productId) { wrap.innerHTML = `<p class="error-text">No product selected.</p>`; return; }
    try {
      const p = await apiFetch(`/products/${productId}`);
      currentStock = p.stock;
      wrap.innerHTML = `
        <div class="pd-wrap">
          <div style="position:relative;">
            <button class="wish-btn ${isWishlisted(p.id) ? 'active' : ''}" aria-label="Toggle wishlist" onclick="handleWishlist('${p.id}', this)">
              <svg viewBox="0 0 24 24" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
            </button>
            <img src="${p.image_url}" alt="${p.name}">
          </div>
          <div>
            <p class="eyebrow">${p.brand || 'Essence House'} · ${p.category}</p>
            <h1 style="font-size:2.2rem; margin:8px 0;">${p.name}</h1>
            <p class="price" style="font-size:1.3rem;">${formatPrice(p.price)}</p>
            <p style="color:var(--grey); line-height:1.8; margin-top:16px;">${p.description || ''}</p>

            <div class="notes-pyramid">
              <div class="note-row"><span class="label">Top Notes</span><span>${p.top_notes || '—'}</span></div>
              <div class="note-row"><span class="label">Heart Notes</span><span>${p.heart_notes || '—'}</span></div>
              <div class="note-row"><span class="label">Base Notes</span><span>${p.base_notes || '—'}</span></div>
            </div>

            <div class="qty-row">
              <button onclick="changeQty(-1)">−</button>
              <span id="qtyDisplay">1</span>
              <button onclick="changeQty(1)">+</button>
              <span style="color:var(--grey); font-size:.85rem;">${p.stock > 0 ? p.stock + ' in stock' : 'Out of stock'}</span>
            </div>

            <button class="btn-gold" id="addToCartBtn" onclick="addToCart('${p.id}')" ${p.stock === 0 ? 'disabled' : ''}>
              ${p.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `;

      // Mobile sticky add-to-cart bar
      const stickyBar = document.getElementById('stickyBar');
      document.getElementById('stickyPrice').textContent = formatPrice(p.price);
      const stickyBtn = document.getElementById('stickyAddBtn');
      stickyBtn.disabled = p.stock === 0;
      stickyBtn.textContent = p.stock === 0 ? 'Out of Stock' : 'Add to Cart';
      stickyBar.style.display = 'flex';

      trackRecentlyViewed(p.id);
      loadRelated(p.category, p.id);
    } catch (err) {
      wrap.innerHTML = `
        <div style="text-align:center;">
          <p class="error-text">Couldn't load product: ${err.message}</p>
          <button class="retry-btn" onclick="loadProduct()">Retry</button>
        </div>`;
    }
  }

  function handleWishlist(id, btn) {
    const nowActive = toggleWishlist(id);
    btn.classList.toggle('active', nowActive);
    showToast(nowActive ? 'Added to wishlist' : 'Removed from wishlist', 'success', 1800);
  }

  async function loadRelated(category, excludeId) {
    const section = document.getElementById('relatedSection');
    const rail = document.getElementById('relatedRail');
    try {
      const products = await apiFetch(`/products?category=${category}`);
      const related = products.filter(p => p.id !== excludeId).slice(0, 8);
      if (!related.length) { section.style.display = 'none'; return; }
      rail.innerHTML = related.map(p => `
        <a class="rail-card" href="product.html?id=${p.id}">
          <img src="${p.image_url}" alt="${p.name}">
          <p>${p.name}</p>
          <p class="price">${formatPrice(p.price)}</p>
        </a>
      `).join('');
      section.style.display = 'block';
    } catch {
      section.style.display = 'none';
    }
  }

  function changeQty(delta) {
    const next = currentQty + delta;
    if (next < 1) return;
    if (next > currentStock) { showToast(`Only ${currentStock} left in stock.`, 'error'); return; }
    currentQty = next;
    document.getElementById('qtyDisplay').textContent = currentQty;
  }

  async function addToCart(id) {
    const btn = document.getElementById('addToCartBtn');
    const stickyBtn = document.getElementById('stickyAddBtn');
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      guestAddToCart(id, currentQty);
      refreshCartBadge(); pulseCartBadge();
      showToast('Added to cart — log in at checkout to complete your order.', 'success');
      return;
    }

    [btn, stickyBtn].forEach(b => { if (b) { b.disabled = true; b.dataset.original = b.textContent; b.textContent = 'Adding…'; } });
    try {
      await apiFetch('/cart', { method: 'POST', body: JSON.stringify({ product_id: id, quantity: currentQty }) });
      refreshCartBadge(); pulseCartBadge();
      showToast('Added to cart', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      [btn, stickyBtn].forEach(b => { if (b) { b.disabled = false; b.textContent = b.dataset.original || 'Add to Cart'; } });
    }
  }

  loadProduct();
</script>
</body>
</html>
