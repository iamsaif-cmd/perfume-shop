<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence — Product</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar-essence">
  <div class="container">
    <a href="index.html" class="logo">ESSEN<span>CE</span></a>
    <input type="checkbox" id="navToggle">
    <label for="navToggle" class="burger"><span></span><span></span><span></span></label>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span id="cartBadge" class="cart-badge" style="display:none;"></span></a>
      <a id="navAdminLink" href="admin.html" style="display:none;">Admin</a>
      <a id="navAuthLink" href="login.html">Login</a>
    </div>
  </div>
</nav>

<section>
  <div class="container" id="productDetail">
    <p style="color:var(--grey);">Loading…</p>
  </div>
</section>

<footer><div class="container"><p>© 2026 Essence Perfumery</p></div></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let currentQty = 1;

  async function loadProduct() {
    const wrap = document.getElementById('productDetail');
    if (!productId) { wrap.innerHTML = `<p class="error-text">No product selected.</p>`; return; }
    try {
      const p = await apiFetch(`/products/${productId}`);
      wrap.innerHTML = `
        <div class="pd-wrap">
          <img src="${p.image_url}" alt="${p.name}">
          <div>
            <p class="eyebrow">${p.brand || 'Essence House'} · ${p.category}</p>
            <h1 style="font-size:2.2rem; margin:8px 0;">${p.name}</h1>
            <p class="price" style="font-size:1.3rem;">${formatPrice(p.price)}</p>
            <p style="color:var(--grey); line-height:1.8; margin-top:16px;">${p.description || ''}</p>

            <div class="notes-pyramid">
              <div class="note-row"><span class="label">Top Notes</span><span>${p.top_notes || '—'}</span></div>
              <div class="note-row"><span class="label">Heart Notes</span><span>${p.heart_notes || '—'}</span></div>
              <div class="note-row"><span class="label">Base Notes</span><span>${p.base_notes || '—'}</span></div>
            </div>

            <div class="qty-row">
              <button onclick="changeQty(-1)">−</button>
              <span id="qtyDisplay">1</span>
              <button onclick="changeQty(1)">+</button>
              <span style="color:var(--grey); font-size:.85rem;">${p.stock} in stock</span>
            </div>

            <button class="btn-gold" onclick="addToCart('${p.id}')" ${p.stock === 0 ? 'disabled' : ''}>
              ${p.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `;
    } catch (err) {
      wrap.innerHTML = `<p class="error-text">Couldn't load product: ${err.message}</p>`;
    }
  }

  function changeQty(delta) {
    currentQty = Math.max(1, currentQty + delta);
    document.getElementById('qtyDisplay').textContent = currentQty;
  }

  async function addToCart(id) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    try {
      await apiFetch('/cart', { method: 'POST', body: JSON.stringify({ product_id: id, quantity: currentQty }) });
      refreshCartBadge();
      alert('Added to cart');
    } catch (err) {
      alert(err.message);
    }
  }

  loadProduct();
</script>
</body>
</html>
